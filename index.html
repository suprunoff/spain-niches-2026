<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spain Niches 2026</title>
<style>
  :root {
    --t1: #10b981;
    --t2: #3b82f6;
    --t3: #f59e0b;
    --t4: #6b7280;
    --accent: #6366f1;
    --sidebar-bg: #0f172a;
    --sidebar-hover: #1e293b;
    --sidebar-selected: #1e3a5f;
    --main-bg: #0d1117;
    --card-bg: #161b22;
    --border: #21262d;
    --text: #e6edf3;
    --text-muted: #7d8590;
    --text-dim: #4d5566;
    --green: #10b981;
    --amber: #f59e0b;
    --orange: #f97316;
    --red: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--main-bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }

  .app {
    display: flex;
    height: 100vh;
  }

  /* ─── LEFT PANEL ─────────────────────────────────────────── */
  .left-panel {
    width: 320px;
    min-width: 280px;
    max-width: 320px;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .left-header {
    padding: 16px 14px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .left-header h1 {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .left-header h1 span.flag { font-size: 16px; }

  .search-container {
    padding: 10px 10px 6px;
    flex-shrink: 0;
  }

  .search-container input {
    width: 100%;
    background: #1e293b;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 12px;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-container input:focus {
    border-color: var(--accent);
  }

  .search-container input::placeholder { color: var(--text-dim); }

  .filter-row {
    padding: 0 10px 8px;
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .filter-select {
    background: #1e293b;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text-muted);
    font-size: 11px;
    padding: 4px 6px;
    cursor: pointer;
    outline: none;
    flex: 1;
    min-width: 60px;
    transition: border-color 0.15s;
  }

  .filter-select:focus, .filter-select:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .btn-star-filter {
    background: #1e293b;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text-muted);
    font-size: 12px;
    padding: 4px 8px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-star-filter.active {
    background: #2d2a1a;
    border-color: #ca8a04;
    color: #fbbf24;
  }

  .btn-star-filter:hover { border-color: var(--accent); color: var(--text); }

  .stats-mini {
    padding: 4px 12px 8px;
    font-size: 11px;
    color: var(--text-dim);
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }

  .stats-mini span { margin-right: 8px; }
  .stats-mini .s-t1 { color: var(--t1); }
  .stats-mini .s-t2 { color: var(--t2); }
  .stats-mini .s-t3 { color: var(--t3); }

  .niche-list-container {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
  }

  .niche-list-container::-webkit-scrollbar { width: 4px; }
  .niche-list-container::-webkit-scrollbar-track { background: transparent; }
  .niche-list-container::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 2px; }

  .niche-item {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    transition: background 0.1s;
    gap: 8px;
    position: relative;
  }

  .niche-item:hover { background: var(--sidebar-hover); }
  .niche-item.selected { background: var(--sidebar-selected); }

  .niche-item-rank {
    font-size: 10px;
    color: var(--text-dim);
    width: 20px;
    text-align: right;
    flex-shrink: 0;
  }

  .niche-item-body {
    flex: 1;
    min-width: 0;
  }

  .niche-item-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }

  .niche-item-meta {
    display: flex;
    gap: 4px;
    margin-top: 2px;
    align-items: center;
  }

  .tag-type {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    background: rgba(99,102,241,0.15);
    color: #818cf8;
    font-weight: 500;
    white-space: nowrap;
  }

  .niche-item-score {
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
    width: 34px;
    text-align: right;
  }

  .niche-item-tier {
    font-size: 9px;
    font-weight: 600;
    flex-shrink: 0;
    width: 18px;
    text-align: center;
    padding: 2px 0;
    border-radius: 3px;
  }

  .btn-star {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 12px;
    padding: 0 2px;
    opacity: 0.3;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }

  .btn-star.starred { opacity: 1; }
  .niche-item:hover .btn-star { opacity: 0.6; }
  .niche-item:hover .btn-star.starred { opacity: 1; }

  .empty-list {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
  }

  /* ─── RIGHT PANEL ────────────────────────────────────────── */
  .right-panel {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    background: var(--main-bg);
  }

  .right-panel::-webkit-scrollbar { width: 6px; }
  .right-panel::-webkit-scrollbar-track { background: transparent; }
  .right-panel::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 3px; }

  /* Empty state */
  #emptyState {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    gap: 12px;
  }

  #emptyState .es-flag { font-size: 48px; }
  #emptyState h2 { font-size: 18px; font-weight: 600; color: var(--text-muted); }
  #emptyState p { font-size: 13px; }
  #emptyState .es-hint {
    margin-top: 8px;
    font-size: 11px;
    background: #1e293b;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 16px;
    color: var(--text-dim);
  }

  /* Detail card */
  #detailCard {
    padding: 28px 32px 48px;
    max-width: 900px;
  }

  /* Section header */
  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .detail-section {
    margin-bottom: 28px;
  }

  /* ── HEADER ── */
  .detail-header {
    margin-bottom: 28px;
  }

  .detail-header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }

  .detail-name {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }

  .detail-sub {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .detail-badges {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 4px;
  }

  .badge-type {
    background: rgba(99,102,241,0.15);
    color: #818cf8;
    border: 1px solid rgba(99,102,241,0.2);
  }

  .badge-tier {
    padding: 3px 7px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
  }

  .badge-dd {
    background: rgba(16,185,129,0.1);
    color: #34d399;
    border: 1px solid rgba(16,185,129,0.2);
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
  }

  .detail-score-block {
    text-align: right;
    flex-shrink: 0;
  }

  .detail-score {
    font-size: 36px;
    font-weight: 800;
    line-height: 1;
  }

  .detail-score-label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 2px;
  }

  /* ── THESIS ── */
  .gap-statement {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 6px;
    padding: 14px 16px;
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
    margin-bottom: 10px;
  }

  .gtm-text {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.6;
    padding: 0 2px;
  }

  .gtm-text strong { color: var(--text-dim); font-weight: 600; }

  /* ── METRICS ── */
  .metrics-row {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 10px;
  }

  .metric-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
  }

  .metric-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .metric-value {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }

  .metric-sub {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .metric-null { color: var(--text-dim) !important; font-weight: 400 !important; }

  /* ── SCORE FACTORS ── */
  .factors-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .factor-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
  }

  .factor-icon { font-size: 14px; flex-shrink: 0; }

  .factor-body { flex: 1; min-width: 0; }

  .factor-name {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .factor-bar-track {
    height: 5px;
    background: #1e293b;
    border-radius: 3px;
    overflow: hidden;
  }

  .factor-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s ease;
  }

  .factor-val {
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
    width: 18px;
    text-align: right;
  }

  /* ── DEEP DIVE ── */
  .detail-expandable {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
    overflow: hidden;
  }

  .expandable-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
    transition: background 0.1s;
  }

  .expandable-header:hover { background: rgba(255,255,255,0.03); }

  .expandable-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .expandable-arrow {
    color: var(--text-dim);
    font-size: 10px;
    transition: transform 0.2s;
  }

  .detail-expandable.open .expandable-arrow { transform: rotate(90deg); }

  .expandable-body {
    padding: 0 16px 14px;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.65;
    display: none;
  }

  .detail-expandable.open .expandable-body { display: block; }

  /* ─── TIER COLORS ─────────────────────────── */
  .score-t1, .tier-t1 { color: var(--t1); }
  .score-t2, .tier-t2 { color: var(--t2); }
  .score-t3, .tier-t3 { color: var(--t3); }
  .score-t4, .tier-t4 { color: var(--t4); }

  .bg-t1 { background: rgba(16,185,129,0.15); border-color: rgba(16,185,129,0.25); }
  .bg-t2 { background: rgba(59,130,246,0.15); border-color: rgba(59,130,246,0.25); }
  .bg-t3 { background: rgba(245,158,11,0.15); border-color: rgba(245,158,11,0.25); }
  .bg-t4 { background: rgba(107,114,128,0.15); border-color: rgba(107,114,128,0.25); }

  .bar-green { background: var(--green); }
  .bar-amber { background: var(--amber); }
  .bar-orange { background: var(--orange); }
  .bar-red { background: var(--red); }

  /* ─── RESPONSIVE ──────────────────────────── */
  @media (max-width: 1100px) {
    .metrics-row { grid-template-columns: repeat(3, 1fr); }
  }

  @media (max-width: 768px) {
    .app { flex-direction: column; }
    .left-panel { width: 100%; max-width: 100%; height: 40vh; min-height: 280px; border-right: none; border-bottom: 1px solid var(--border); }
    .right-panel { flex: 1; }
    #detailCard { padding: 16px; }
    .detail-header-top { flex-direction: column; }
    .detail-score-block { text-align: left; }
    .metrics-row { grid-template-columns: repeat(2, 1fr); }
    .factors-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- ── LEFT PANEL ── -->
  <aside class="left-panel">
    <div class="left-header">
      <h1><span class="flag">🇪🇸</span> Spain Niches 2026</h1>
    </div>

    <div class="search-container">
      <input type="text" id="searchInput" placeholder="Search niches… (Cmd+K)" autocomplete="off">
    </div>

    <div class="filter-row">
      <select id="filterType" class="filter-select">
        <option value="">All types</option>
      </select>
      <select id="filterTier" class="filter-select">
        <option value="">All tiers</option>
        <option value="1">T1</option>
        <option value="2">T2</option>
        <option value="3">T3</option>
      </select>
      <select id="filterMvp" class="filter-select">
        <option value="">Any MVP</option>
        <option value="4">≤4w</option>
        <option value="8">≤8w</option>
      </select>
      <button id="btnStarFilter" class="btn-star-filter" title="Show starred only">★</button>
    </div>

    <div class="stats-mini" id="statsMini"></div>

    <div class="niche-list-container">
      <div id="nicheList"></div>
    </div>
  </aside>

  <!-- ── RIGHT PANEL ── -->
  <main class="right-panel" id="rightPanel">
    <div id="emptyState">
      <div class="es-flag">🇪🇸</div>
      <h2>Spain Niches Dashboard</h2>
      <p>Select a niche from the list to view its full profile</p>
      <div class="es-hint">↑↓ Navigate · Enter Select · Cmd+K Search</div>
    </div>
    <div id="detailCard" style="display:none"></div>
  </main>
</div>

<script>
const state = {
  data: [],
  filtered: [],
  selected: null,
  filters: { search: '', type: '', tier: '', mvp: '', starred: false },
  starred: new Set(),
  sortCol: 'score',
  sortAsc: false
};

// ─── UTILS ───────────────────────────────────────────────────

function tierNum(score) {
  if (score >= 8.5) return 1;
  if (score >= 7.0) return 2;
  if (score >= 5.5) return 3;
  return 4;
}

function tierColor(t) {
  return ['', 'var(--t1)', 'var(--t2)', 'var(--t3)', 'var(--t4)'][t] || 'var(--t4)';
}

function tierClass(t) {
  return `score-t${t}`;
}

function factorColor(val) {
  if (val >= 8) return 'bar-green';
  if (val >= 6) return 'bar-amber';
  if (val >= 4) return 'bar-orange';
  return 'bar-red';
}

function factorColorHex(val) {
  if (val >= 8) return 'var(--green)';
  if (val >= 6) return 'var(--amber)';
  if (val >= 4) return 'var(--orange)';
  return 'var(--red)';
}

function fmt(val, prefix = '', suffix = '') {
  if (val === null || val === undefined || val === '') return '—';
  return `${prefix}${val}${suffix}`;
}

function esc(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ─── DATA ────────────────────────────────────────────────────

async function loadData() {
  try {
    const res = await fetch('data/niches.json');
    state.data = await res.json();
    // Sort by score desc
    state.data.sort((a, b) => b.score - a.score);
    // Populate type filter
    const types = [...new Set(state.data.map(n => n.type).filter(Boolean))].sort();
    const sel = document.getElementById('filterType');
    types.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t;
      opt.textContent = t;
      sel.appendChild(opt);
    });
    render();
  } catch (e) {
    document.getElementById('nicheList').innerHTML =
      '<div class="empty-list">Failed to load niches.json</div>';
  }
}

// ─── FILTER ──────────────────────────────────────────────────

function applyFilters() {
  const { search, type, tier, mvp, starred } = state.filters;
  const q = search.toLowerCase();
  state.filtered = state.data.filter(n => {
    if (q && !(
      n.name.toLowerCase().includes(q) ||
      (n.sub || '').toLowerCase().includes(q) ||
      (n.type || '').toLowerCase().includes(q) ||
      (n.gap || '').toLowerCase().includes(q)
    )) return false;
    if (type && n.type !== type) return false;
    if (tier && tierNum(n.score) !== parseInt(tier)) return false;
    if (mvp) {
      const weeks = parseInt(mvp);
      if (!n.mi || n.mi > weeks) return false;
    }
    if (starred && !state.starred.has(n.rank)) return false;
    return true;
  });
}

// ─── RENDER LIST ─────────────────────────────────────────────

function renderList() {
  const list = document.getElementById('nicheList');
  const stats = document.getElementById('statsMini');

  if (!state.filtered.length) {
    list.innerHTML = '<div class="empty-list">No niches match</div>';
    stats.innerHTML = 'No results';
    return;
  }

  // Stats
  const t1 = state.filtered.filter(n => tierNum(n.score) === 1).length;
  const t2 = state.filtered.filter(n => tierNum(n.score) === 2).length;
  const t3 = state.filtered.filter(n => tierNum(n.score) === 3).length;
  stats.innerHTML = `<span class="s-t1">T1:${t1}</span><span class="s-t2">T2:${t2}</span><span class="s-t3">T3:${t3}</span><span>Total:${state.filtered.length}</span>`;

  const frag = document.createDocumentFragment();
  state.filtered.forEach((n, idx) => {
    const t = tierNum(n.score);
    const isSelected = state.selected && state.selected.rank === n.rank;
    const isStarred = state.starred.has(n.rank);
    const div = document.createElement('div');
    div.className = `niche-item${isSelected ? ' selected' : ''}`;
    div.dataset.rank = n.rank;
    div.dataset.idx = idx;
    div.innerHTML = `
      <span class="niche-item-rank">${n.rank}</span>
      <div class="niche-item-body">
        <div class="niche-item-name">${esc(n.name)}</div>
        <div class="niche-item-meta">
          <span class="tag-type">${esc(n.type || '')}</span>
        </div>
      </div>
      <span class="niche-item-score ${tierClass(t)}">${n.score.toFixed(2)}</span>
      <span class="niche-item-tier badge-tier bg-t${t}" style="color:${tierColor(t)}">T${t}</span>
      <button class="btn-star${isStarred ? ' starred' : ''}" data-rank="${n.rank}" title="Star">★</button>
    `;
    frag.appendChild(div);
  });
  list.innerHTML = '';
  list.appendChild(frag);

  // Scroll selected into view
  if (state.selected) {
    const sel = list.querySelector('.selected');
    if (sel) sel.scrollIntoView({ block: 'nearest' });
  }
}

// ─── RENDER DETAIL ────────────────────────────────────────────

function renderDetail(niche) {
  const card = document.getElementById('detailCard');
  const t = tierNum(niche.score);
  const isStarred = state.starred.has(niche.rank);

  const factors = [
    { key: 'd', icon: '🔥', label: 'Demand' },
    { key: 'g', icon: '🎯', label: 'Gap' },
    { key: 'r', icon: '📋', label: 'Regulatory' },
    { key: 's', icon: '⚡', label: 'Speed' },
    { key: 'm', icon: '💰', label: 'Monetization' },
    { key: 'a', icon: '📣', label: 'Acquisition' },
    { key: 'f', icon: '📈', label: 'Fundability' },
    { key: 't', icon: '⏱', label: 'Timing' },
  ];

  const factorRows = factors.map(f => {
    const val = niche[f.key];
    if (val === null || val === undefined) return '';
    const pct = (val / 10) * 100;
    const colorClass = factorColor(val);
    const colorHex = factorColorHex(val);
    return `
      <div class="factor-row">
        <span class="factor-icon">${f.icon}</span>
        <div class="factor-body">
          <div class="factor-name">${f.label}</div>
          <div class="factor-bar-track">
            <div class="factor-bar-fill ${colorClass}" style="width:${pct}%"></div>
          </div>
        </div>
        <span class="factor-val" style="color:${colorHex}">${val}</span>
      </div>
    `;
  }).join('');

  const mvpStr = (niche.mi && niche.mx) ? `${niche.mi}–${niche.mx}w` : (niche.mi ? `${niche.mi}w` : '—');
  const cacStr = niche.cac ? `€${niche.cac}` : '—';
  const ltvStr = niche.ltv ? `€${niche.ltv}` : '—';
  const ltvCac = (niche.cac && niche.ltv) ? (niche.ltv / niche.cac).toFixed(1) + 'x' : '—';
  const y1Str = fmt(niche.y1);
  const tamStr = fmt(niche.tam);

  // Deep dive expandables
  let deepDiveHtml = '';
  if (niche.dd) {
    const sections = [
      { icon: '🚀', title: 'GTM Strategy', content: niche.gtm },
      { icon: '⚠️', title: 'Key Risks', content: niche.risks },
      { icon: '🔧', title: 'MVP Scope', content: niche.mvpScope },
    ];
    deepDiveHtml = `
      <div class="detail-section">
        <div class="section-label">Deep Dive</div>
        ${sections.map(s => s.content ? `
          <div class="detail-expandable" data-section="${esc(s.title)}">
            <div class="expandable-header">
              <span class="expandable-title">${s.icon} ${esc(s.title)}</span>
              <span class="expandable-arrow">▶</span>
            </div>
            <div class="expandable-body">${esc(s.content)}</div>
          </div>
        ` : '').join('')}
      </div>
    `;
  }

  card.innerHTML = `
    <!-- HEADER -->
    <div class="detail-header">
      <div class="detail-header-top">
        <div>
          <div class="detail-name">${esc(niche.name)}</div>
          ${niche.sub ? `<div class="detail-sub">${esc(niche.sub)}</div>` : ''}
          <div class="detail-badges">
            <span class="badge badge-type">${esc(niche.type || '')}</span>
            <span class="badge badge-tier bg-t${t}" style="color:${tierColor(t)}">Tier ${t}</span>
            ${niche.dd ? '<span class="badge-dd">Deep Dive</span>' : ''}
            ${niche.churn ? `<span class="badge" style="background:rgba(107,114,128,0.1);color:var(--text-dim);border:1px solid var(--border)">Churn ${esc(niche.churn)}</span>` : ''}
            <button class="btn-star${isStarred ? ' starred' : ''}" style="opacity:1;font-size:16px" data-rank="${niche.rank}" title="Star this niche">★</button>
          </div>
        </div>
        <div class="detail-score-block">
          <div class="detail-score ${tierClass(t)}">${niche.score.toFixed(2)}</div>
          <div class="detail-score-label">Niche Score</div>
        </div>
      </div>
    </div>

    <!-- THESIS -->
    <div class="detail-section">
      <div class="section-label">Thesis</div>
      ${niche.gap ? `<div class="gap-statement">${esc(niche.gap)}</div>` : ''}
      ${niche.gtm && !niche.dd ? `<div class="gtm-text"><strong>Entry:</strong> ${esc(niche.gtm)}</div>` : ''}
      ${!niche.gap && !niche.gtm ? `<div class="gtm-text" style="color:var(--text-dim)">No thesis data</div>` : ''}
    </div>

    <!-- METRICS -->
    <div class="detail-section">
      <div class="section-label">Metrics</div>
      <div class="metrics-row">
        <div class="metric-card">
          <div class="metric-label">TAM</div>
          <div class="metric-value ${tamStr === '—' ? 'metric-null' : ''}">${tamStr}</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">MVP</div>
          <div class="metric-value ${mvpStr === '—' ? 'metric-null' : ''}">${mvpStr}</div>
          ${mvpStr !== '—' ? '<div class="metric-sub">weeks</div>' : ''}
        </div>
        <div class="metric-card">
          <div class="metric-label">CAC</div>
          <div class="metric-value ${cacStr === '—' ? 'metric-null' : ''}">${cacStr}</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">LTV</div>
          <div class="metric-value ${ltvStr === '—' ? 'metric-null' : ''}">${ltvStr}</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">LTV/CAC</div>
          <div class="metric-value ${ltvCac === '—' ? 'metric-null' : ''}">${ltvCac}</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Y1 ARR</div>
          <div class="metric-value ${y1Str === '—' ? 'metric-null' : ''}">${y1Str}</div>
        </div>
      </div>
    </div>

    <!-- SCORE FACTORS -->
    <div class="detail-section">
      <div class="section-label">Score Factors · ${niche.score.toFixed(2)}</div>
      <div class="factors-grid">
        ${factorRows}
      </div>
    </div>

    ${deepDiveHtml}
  `;
}

// ─── SELECT NICHE ─────────────────────────────────────────────

function selectNiche(rank) {
  const niche = state.filtered.find(n => n.rank === parseInt(rank));
  if (!niche) return;
  state.selected = niche;

  document.getElementById('emptyState').style.display = 'none';
  const card = document.getElementById('detailCard');
  card.style.display = 'block';
  renderDetail(niche);
  renderList(); // update selected highlight

  // Scroll right panel to top
  document.getElementById('rightPanel').scrollTop = 0;
}

function clearSelection() {
  state.selected = null;
  document.getElementById('emptyState').style.display = 'flex';
  document.getElementById('detailCard').style.display = 'none';
  renderList();
}

// ─── STAR ─────────────────────────────────────────────────────

function toggleStar(rank, e) {
  e.stopPropagation();
  rank = parseInt(rank);
  if (state.starred.has(rank)) {
    state.starred.delete(rank);
  } else {
    state.starred.add(rank);
  }
  // Persist
  localStorage.setItem('starred', JSON.stringify([...state.starred]));

  // Re-render if star filter is on
  if (state.filters.starred) {
    render();
  } else {
    renderList();
    if (state.selected && state.selected.rank === rank) {
      renderDetail(state.selected);
    }
  }
}

// ─── KEYBOARD ────────────────────────────────────────────────

function handleKeyDown(e) {
  // Cmd+K: focus search
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
    document.getElementById('searchInput').select();
    return;
  }

  // Skip if typing in input
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

  const len = state.filtered.length;
  if (!len) return;

  if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
    e.preventDefault();
    let idx = state.selected
      ? state.filtered.findIndex(n => n.rank === state.selected.rank)
      : -1;
    if (e.key === 'ArrowDown') idx = Math.min(idx + 1, len - 1);
    else idx = Math.max(idx - 1, 0);
    selectNiche(state.filtered[idx].rank);
  }

  if (e.key === 'Escape') {
    clearSelection();
  }
}

// ─── RENDER (master) ─────────────────────────────────────────

function render() {
  applyFilters();
  renderList();
  if (state.selected) {
    const stillExists = state.filtered.find(n => n.rank === state.selected.rank);
    if (stillExists) {
      state.selected = stillExists;
      renderDetail(stillExists);
    } else {
      clearSelection();
    }
  }
}

// ─── EVENT BINDINGS ──────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
  // Load starred from localStorage
  try {
    const saved = JSON.parse(localStorage.getItem('starred') || '[]');
    state.starred = new Set(saved);
  } catch (_) {}

  loadData();

  // Search
  document.getElementById('searchInput').addEventListener('input', e => {
    state.filters.search = e.target.value;
    render();
  });

  // Filters
  document.getElementById('filterType').addEventListener('change', e => {
    state.filters.type = e.target.value;
    render();
  });

  document.getElementById('filterTier').addEventListener('change', e => {
    state.filters.tier = e.target.value;
    render();
  });

  document.getElementById('filterMvp').addEventListener('change', e => {
    state.filters.mvp = e.target.value;
    render();
  });

  document.getElementById('btnStarFilter').addEventListener('click', () => {
    state.filters.starred = !state.filters.starred;
    document.getElementById('btnStarFilter').classList.toggle('active', state.filters.starred);
    render();
  });

  // Niche list clicks (delegated)
  document.getElementById('nicheList').addEventListener('click', e => {
    const starBtn = e.target.closest('.btn-star');
    if (starBtn) {
      toggleStar(starBtn.dataset.rank, e);
      return;
    }
    const item = e.target.closest('.niche-item');
    if (item) {
      selectNiche(item.dataset.rank);
    }
  });

  // Detail card clicks (delegated — expandables + star)
  document.getElementById('detailCard').addEventListener('click', e => {
    const starBtn = e.target.closest('.btn-star');
    if (starBtn) {
      toggleStar(starBtn.dataset.rank, e);
      return;
    }
    const expHeader = e.target.closest('.expandable-header');
    if (expHeader) {
      expHeader.closest('.detail-expandable').classList.toggle('open');
    }
  });

  // Keyboard
  document.addEventListener('keydown', handleKeyDown);
});
</script>
</body>
</html>
